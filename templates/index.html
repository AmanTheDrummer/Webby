<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Webby AI</title>

    <!-- Bricolage Grotesque font CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">

    <!-- CSS link -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary nav-style" data-bs-theme="dark">
            <div class="container-fluid px-4">
                <a class="navbar-brand site-title" href="#" aria-label="Webby AI Home">
                    Webby
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#" role="button">Home</a>
                        </li>
                        <li>
                            <button id="restartBtn" type="button" aria-label="Restart conversation">
                                Restart
                            </button>
                        </li>
                    </ul>

                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"
                                data-bs-toggle="dropdown" aria-expanded="false" aria-label="User menu">
                                {{ session.get('username', 'Guest') }}
                                <span class="status-indicator" title="Online"></span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                                <li><a class="dropdown-item" href="#" role="button">Profile</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item" href="/logout" role="button">Log out</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="main-section container-fluid p-0">
            <div class="row g-0 h-100">
                <div class="col-lg-3 col-md-4 chat-panel">
                    <div class="dynamic-section">
                        <div class="section-header">
                            <span id="section-title">💬 Webby <span class="status-indicator"></span></span>
                        </div>

                        <!-- Dynamic Content Switching 1 -->
                        <div class="section-content" style="position: relative;">

                            <!-- Chat Section -->
                            <div id="chatSection" class="section-panel">
                                <div class="chat-box p-4" id="chatBox" aria-live="polite"
                                    aria-label="Chat conversation">
                                    <!-- Messages will be added here dynamically -->
                                </div>
                                <div class="typing-indicator" id="typingIndicator" aria-label="AI is typing">
                                    <div class="dot"></div>
                                    <div class="dot"></div>
                                    <div class="dot"></div>
                                </div>
                                <form id="chat-form" class="chat-box-input" role="form">
                                    <div class="input-group">
                                        <input type="text" id="messageInput" class="form-control text-light"
                                            placeholder="Type your message here..." required maxlength="500"
                                            aria-label="Message input" autocomplete="off">
                                        <button class="btn" type="submit" id="sendBtn" aria-label="Send message">
                                            Send
                                        </button>
                                    </div>
                                </form>
                            </div>

                            <!-- Edit Section (Dynamic Content Swapping 2)-->
                            <div id="EditSection" class="section-panel hidden">
                                <div class="edit-tools">
                                    <div class="unsplash-search p-1 d-flex align-items-center">
                                        <input type="text" id="unsplash-query" class="form-control"
                                            placeholder="Search images...">
                                        <button id="edit-search-btn" class="btn btn-primary mt-2">Search</button>
                                    </div>

                                    <div class="editor-toolbar" role="toolbar" aria-label="Edit">
                                        <button type="button" class="editor-tool active" id="imagesTool"
                                            data-tool="images" aria-pressed="true">Images</button>
                                        <button type="button" class="editor-tool" id="graphicsTool" data-tool="graphics"
                                            aria-pressed="false">Graphics</button>
                                        <button type="button" class="editor-tool" id="videosTool" data-tool="videos"
                                            aria-pressed="false">Videos</button>
                                    </div>

                                </div>
                                <div class="edit-content">
                                    <!-- Image Content -->
                                    <div id="imagesSection" class="edit-section active">
                                        <h3>Images</h3>
                                        <!-- <p>Upload or select images to add to your website.</p>
                                        <input type="file" id="imageUpload" accept="image/*" multiple
                                            aria-label="Image upload"> -->
                                        <div id="image-gallery" class="d-flex flex-wrap gap-2 mt-3"></div>
                                        <div id="imagePreview" class="image-preview">

                                        </div>

                                    </div>
                                    <!-- Graphics Content -->
                                    <div id="graphicsSection" class="edit-section hidden">
                                        <h3>Graphics</h3>
                                        <!-- <p>Upload or select graphics to add to your website.</p>
                                        <input type="file" id="graphicsUpload" accept="graphics/*" multiple
                                            aria-label="Graphics upload"> -->
                                        <div id="graphicsPreview" class="graphics-preview"></div>

                                    </div>

                                    <!-- Videos Content -->
                                    <div id="videosSection" class="edit-section hidden">
                                        <h3>Videos</h3>
                                        <!-- <p>Upload or select videos to add to your website.</p>
                                        <input type="file" id="videoUpload" accept="video/*" multiple
                                            aria-label="Video upload"> -->
                                        <div id="videoPreview" class="video-preview"></div>

                                    </div>

                                </div>
                            </div>

                        </div>
                    </div>
                </div>

                <div class="col-lg-9 col-md-8 preview-panel">
                    <!-- Preview Frame for generated -->
                    <div class="iframe-container">
                        <iframe src="/sitepreview/latest" id="resultFrame" class="preview-frame"
                            title="Generated website preview" loading="lazy"></iframe>
                        <div id="loader-overlay">
                            <div class="loader"></div>
                        </div>
                    </div>

                    <!-- Tool-Bar Icons -->
                    <div class="tool-bar d-flex justify-content-center align-items-center" role="toolbar"
                        aria-label="Tool selection">
                        <a><img src="/static/assets/icons/messages.svg" alt="chat" type="button"
                                class="tool-icons active" id="chatTool" title="Chat Mode" aria-label="Chat mode"
                                data-section="chat" aria-pressed="true"></a>

                        <a><img src="/static/assets/icons/add-image.svg" alt="add-image" type="button"
                                class="tool-icons" id="editTool" title="Add Media" aria-label="Edit mode"
                                data-section="edit" aria-pressed="false"></a>

                        <a><img src="/static/assets/icons/download.svg" alt="Download" type="button" class="tool-icons"
                                title="Download preview" aria-label="Download"></a>

                        <a><img src="/static/assets/icons/expand.svg" alt="Full Screen" type="button" class="tool-icons"
                                title="Full screen preview" aria-label="Full screen"></a>

                        <a><img src="/static/assets/icons/bookmark.svg" alt="Save Changes" type="button"
                                class="tool-icons save-changes" title="Save changes" aria-label="Save changes"></a>

                        <a><img src="/static/assets/icons/pencil.svg" alt="Edit Mode" type="button"
                                class="tool-icons toggle-edit" title="Toggle edit mode" aria-label="Toggle edit mode"
                                id="toggleEditBtn"></a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
        crossorigin="anonymous"></script>

    <!-- Fixed JS path -->
    <script src="/static/main.js"></script>

</body>

</html>
