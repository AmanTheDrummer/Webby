<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webby AI</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">

    <!-- CSS link - Fixed path -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <header>
        <!-- Navbar Section -->
        <nav class="navbar navbar-expand-lg bg-body-tertiary nav-style" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Webby</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Home</a>
                        </li>
                        <li>
                            <button id="restartBtn" class="mx-2 mt-1" sandbox="allow-scripts allow-same-origin">Restart</button>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="main-section container">
            <div class="mt-4 d-flex flex-row">
                <div class="col-6">
                    <div class="chat-box p-4 m-0">

                    </div>
                    <form id="chat-form" class="p-0 m-0">
                        <div class="input-group flex-wrap chat-box-input">
                            <input type="text" class="form-control  text-light" placeholder="Enter a prompt..."
                                required>
                            <button class="btn btn-outline-secondary rounded-0" type="submit">Send</button>
                        </div>
                    </form>
                </div>
                <div class="col-6">
                    <!-- Fixed iframe path to match Flask route -->
                    <iframe src="/backend/generated_sites/website.html" id="resultFrame" style="width:100%; height:530px; border:1px solid #3f3e3e;"></iframe>
                </div>

            </div>
        </section>
    </main>

    <footer></footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
        crossorigin="anonymous"></script>

    <!-- Fixed JS path -->
    <script src="/static/main.js"></script>

</body>

</html>
